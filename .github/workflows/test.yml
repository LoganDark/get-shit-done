name: Tests

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Static lint: no source-grep tests in the test suite.
  # Runs once (not per matrix node version) since it is a file-content check.
  lint-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # W-3 (plan 01-04): full history so origin/main is reachable for
          # scripts/check-skip-count.cjs. The script also enforces this under
          # CI=true (defense in depth — both the workflow YAML and the script
          # detect a missing baseline non-silently).
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
      - name: Lint — no source-grep tests
        shell: bash
        run: node scripts/lint-no-source-grep.cjs
      - name: Lint — command contract (ADR-0002)
        shell: bash
        run: node scripts/lint-command-contract.cjs
      - name: Check — skip count must not increase from main
        # W-3 fix: ensure origin/main is reachable. Two defenses:
        # (a) the checkout step above uses `fetch-depth: 0` so the full
        #     history is available;
        # (b) under CI=true, scripts/check-skip-count.cjs exits 1 if origin/main
        #     is still unreachable — i.e., if (a) was reverted or the fetch failed.
        shell: bash
        run: |
          git fetch origin main --depth=1 || true
          node scripts/check-skip-count.cjs
      - name: Lint — no raw git in jj-reachable code
        shell: bash
        run: node scripts/lint-vcs-no-raw-git.cjs

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    # Phase 3 plan 03-07 (CI-01): the jj-colocated lane is allowed to fail —
    # CI-01 graduates to required-blocking in Phase 5 (per D-11). The matrix-
    # level `continue-on-error` below absorbs per-cell failures so the git
    # lane doesn't get masked when a jj-side test surfaces drift.
    continue-on-error: ${{ matrix.backend == 'jj-colocated' }}

    strategy:
      # Phase 3 plan 03-07 (CI-01 D-11): fail-fast disabled so a jj-colocated
      # cell failure does NOT abort the git lane. The matrix
      # `continue-on-error` flag above keeps the workflow green on jj-only
      # failures while still reporting per-cell status.
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [22, 24]
        # Phase 3 plan 03-07 (CI-01): jj-colocated backend lane added to the
        # ubuntu-latest matrix. macOS stays git-only via the `include:` shape
        # below — the jj install step targets `unknown-linux-musl` tarballs
        # and would fail on the macOS runner.
        backend: [git, jj-colocated]
        include:
          # Single macOS runner — verifies platform compatibility on the standard version
          - os: macos-latest
            node-version: 24
            backend: git
          # Windows path/separator coverage is handled by hardcoded-paths.test.cjs
          # and windows-robustness.test.cjs (static analysis, runs on all platforms).
          # A dedicated windows-compat workflow runs on a weekly schedule.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Fetch full history so we can merge origin/main for stale-base detection.
          fetch-depth: 0

      # GitHub's `refs/pull/N/merge` is cached against the recorded merge-base.
      # When main advances after a PR is opened, the cache stays stale and CI
      # runs against the pre-advance state — hiding bugs that are already fixed
      # on trunk and surfacing type errors that were introduced and then patched
      # on main in between. Explicitly merge current origin/main here so tests
      # always run against the latest trunk.
      - name: Rebase check — merge origin/main into PR head
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "ci@gsd-build"
          git config user.name "CI Rebase Check"
          git fetch origin main
          if ! git merge --no-edit --no-ff origin/main; then
            echo "::error::This PR cannot cleanly merge origin/main. Rebase your branch onto current main and push again."
            echo "::error::Conflicting files:"
            git diff --name-only --diff-filter=U
            git merge --abort
            exit 1
          fi

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Phase 3 plan 03-07 (CI-02 + D-14 + D-15): install jj 0.41.0 via the
      # official GitHub release tarball when the matrix cell targets the
      # jj-colocated backend. Pinned version is Renovate-bumpable; no
      # `cargo install` (too slow, requires Rust toolchain). ubuntu-latest
      # resolves `uname -m` to `x86_64`; the tarball provides a static
      # `unknown-linux-musl` build that runs on any Linux distro.
      - name: Install jj
        if: matrix.backend == 'jj-colocated'
        shell: bash
        run: |
          set -euo pipefail
          JJ_VERSION=v0.41.0
          JJ_ARCH=$(uname -m)
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/${JJ_VERSION}/jj-${JJ_VERSION#v}-${JJ_ARCH}-unknown-linux-musl.tar.gz" \
            | tar xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/jj" --version

      - name: Install dependencies
        run: npm ci

      - name: Build SDK dist (required by installer)
        run: npm run build:sdk

      # Seam contract gate: keep manifest -> generated aliases -> registry/CJS adapters aligned.
      # Run once per workflow on the primary Linux node to avoid redundant matrix cost.
      # Phase 3 plan 03-07: also gate on `backend == 'git'` so the jj-colocated
      # cell at ubuntu-latest@24 does not re-run this seam check (it's a
      # file-content gate; backend-independent).
      - name: SDK seam coverage tests
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24 && matrix.backend == 'git'
        shell: bash
        run: cd sdk && npx vitest run src/query/command-seam-coverage.test.ts

      - name: SDK generated alias artifact drift check
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24 && matrix.backend == 'git'
        shell: bash
        run: node sdk/scripts/check-command-aliases-fresh.mjs

      - name: Run tests with coverage
        shell: bash
        # Phase 3 plan 03-07 (CI-01): GSD_TEST_BACKENDS filters the vcsTest
        # matrix to the current cell's backend. Already plumbed through
        # `parseBackendsEnv` in sdk/src/vcs/backends.ts (Phase 1 plan 01-02);
        # no SDK change needed.
        env:
          GSD_TEST_BACKENDS: ${{ matrix.backend }}
        run: npm run test:coverage
